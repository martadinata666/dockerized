variables:
  CI_DOCKERHUB_REGISTRY_IMAGE: "martadinata666/lldap"
  GITHUB_REPO_NAME: "nitnelave/lldap"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"
  RUSTFLAGS: "-Ctarget-feature=+crt-static"
  OPENSSL_INCLUDE_DIR: "/usr/include/openssl/"
  CARGO_TERM_COLOR: always
  SCCACHE_ENDPOINT: "http://192.168.0.2:9000"
  SCCACHE_REGION: "us-east-1"
  SCCACHE_BUCKET: "sccache"
  RUSTC_WRAPPER: "sccache"
  DEV: ""

stages:
  - build-bin
  - dockerize
  - dev

build-lldap-amd64:
  image: 192.168.0.2:5050/dedyms/debian:rust-dev
  stage: build-bin
  cache: 
    key: "$CI_COMMIT_REF_SLUG-amd64"
    paths:
      - $CI_PROJECT_DIR/target
      - .cargo/
    policy: pull-push
  before_script:
    - git clone --depth=1 https://github.com/nitnelave/lldap.git lldap
    - export SCCACHE_S3_KEY_PREFIX=amd64
  script:
    - cd lldap/
    - rustc --version
    - cargo build --target=x86_64-unknown-linux-gnu --release -p lldap -p migration-tool
    - ls -al $CI_PROJECT_DIR/target/
  artifacts:
    paths:
      - target/x86_64-unknown-linux-gnu/release/lldap
      - target/x86_64-unknown-linux-gnu/release/migration-tool
  only:
    changes:
      - Dockerfile.ci


build-lldap-arm64:
  image: 192.168.0.2:5050/dedyms/debian:rust-dev
  stage: build-bin
  cache: 
    key: "$CI_COMMIT_REF_SLUG-arm64"
    paths:
      - $CI_PROJECT_DIR/target
      - .cargo/
    policy: pull-push
  before_script:
    - git clone --depth=1 https://github.com/nitnelave/lldap.git lldap
    - export OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu/
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - export SCCACHE_S3_KEY_PREFIX=arm64
  script:
    - cd lldap/
    - rustc --version
    - cargo build --target=aarch64-unknown-linux-gnu --release -p lldap -p migration-tool
    - ls -al $CI_PROJECT_DIR/target/
  artifacts:
    paths:
      - target/aarch64-unknown-linux-gnu/release/lldap
      - target/aarch64-unknown-linux-gnu/release/migration-tool
  only:
    changes:
      - Dockerfile.ci

build-js:
  image: 192.168.0.2:5050/dedyms/debian:rust-dev
  stage: build-bin
  cache: 
    key: "$CI_COMMIT_REF_SLUG-js"
    paths:
      - .npm-cache/
      - $CI_PROJECT_DIR/target
      - .cargo/
    policy: pull-push
  before_script:
    - git clone --depth=1 https://github.com/nitnelave/lldap.git lldap
    - export SCCACHE_S3_KEY_PREFIX=amd64
    - export PATH="$CI_PROJECT_DIR/.cargo/bin:$PATH"
    - export RUSTFLAGS="-Ctarget-feature=-crt-static"
    - npm install -g rollup
    - cargo install wasm-pack --target x86_64-unknown-linux-gnu
  script:
    - cd lldap/
    - rustc --version
    - app/build.sh
    - ls -al app
  artifacts:
    paths:
      - lldap/app 
      - lldap/docker-entrypoint.sh
      - lldap/lldap_config.docker_template.toml
  only:
    changes:
      - Dockerfile.ci


buildx-git:
  # Official docker image.
  image: 192.168.0.2:5050/dedyms/docker-with-buildx:latest
  needs: ["build-js","build-lldap-amd64","build-lldap-arm64"]
  stage: dockerize
  #services:
  #  - docker:dind
  before_script:
    #- apk add curl jq
    #- export RELEASE=$(curl --silent "https://api.github.com/repos/$GITHUB_REPO_NAME/releases/latest" | jq -r .tag_name)
    - export RELEASE="git"
    - echo $RELEASE
    - export DATE=$(date +%Y%m%d)
    - ls -al
    - ls -al lldap
    - ls -al lldap/app
    - ls -al target
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker login -u "$CI_DOCKERHUB_REGISTRY_USER" -p "$CI_DOCKERHUB_REGISTRY_PASSWORD" $CI_DOCKERHUB_REGISTRY
    - docker run --rm --privileged 192.168.0.2:5050/dedyms/docker-binfmt-qemu:sid
  script:
    - docker buildx create --use --config buildx-config.toml
    #- docker buildx create --append --name nginx-builder node-arm64
    - docker buildx inspect --bootstrap
#    - docker buildx build --push --platform linux/amd64 -t "$CI_REGISTRY_IMAGE" -t "$CI_REGISTRY_IMAGE:$RELEASE" . -f Dockerfile
    - docker buildx build --build-arg RELEASE=$RELEASE --push --platform linux/arm64,linux/amd64 -t "$CI_REGISTRY_IMAGE" -t "$CI_REGISTRY_IMAGE:$RELEASE" -t "$CI_DOCKERHUB_REGISTRY_IMAGE" -t "$CI_DOCKERHUB_REGISTRY_IMAGE:$RELEASE" . -f Dockerfile.ci
  after_script:
    - docker buildx stop
    - docker buildx rm -f
  only:
    changes:
      - Dockerfile.ci

