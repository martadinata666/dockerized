build-static:
  image: 192.168.0.2:5050/dedyms/reactive-resume:develop
  stage: build-static
  before_script:
    - export DATE=$(date +%Y%m%d)
  script:
    - cp -r /home/debian/reactive-resume reactive-resume
    - cd reactive-resume && ls -aln
    - pnpm -d run build
  only:
    refs:
      - master
  artifacts:
      paths:
        - reactive-resume/public

buildx-static-docker-image:
  image: 192.168.0.2:5050/dedyms/docker-with-buildx:latest
  stage: docker-buildx-static
  dependencies: ["build-static"]
  before_script:
    - export RELEASE="static"
    - export DATE=$(date +%Y%m%d)
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker login -u "$CI_DOCKERHUB_REGISTRY_USER" -p "$CI_DOCKERHUB_REGISTRY_PASSWORD" $CI_DOCKERHUB_REGISTRY
    - docker run --rm --privileged 192.168.0.2:5050/dedyms/docker-binfmt-qemu:sid
  script:
    - docker buildx create --use --config buildx-config.toml
    - docker buildx inspect --bootstrap
    - docker buildx build --push --platform linux/arm64,linux/amd64 -t "$CI_REGISTRY_IMAGE:$RELEASE" -t "$CI_DOCKERHUB_REGISTRY_IMAGE:$RELEASE" . -f Dockerfile.static
  only:
    changes:
      - Dockerfile.static
      - .gitlab-ci.yml

